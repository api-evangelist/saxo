apis:

  - name: Saxo Bank OpenAPI
    description: >-
      The Saxo Bank OpenAPI is the unified gateway to Saxo Bank's trading
      infrastructure. It is an HTTP REST API with WebSocket streaming support
      covering 17 service groups: Account History, Asset Transfers, Chart,
      Client Management, Client Reporting, Client Services, Corporate Actions,
      Disclaimer Management, Event Notification Services, Market Overview,
      Partner Integration, Portfolio, Reference Data, Regulatory Services,
      Root Services, Trading, and Value Add. OAuth 2.0 authentication is
      supported via Authorization Code Grant, PKCE, Certificate-Based, and
      Implicit flows.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.developer.saxo/openapi/learn
    baseURL: https://gateway.saxobank.com/openapi
