  - name: Saxo Bank FIX Trading API
    description: >-
      The Saxo Bank FIX API delivers institutional-grade multi-asset liquidity
      via the industry-standard Financial Information eXchange (FIX) protocol.
      It provides a stable, fast, and fully documented electronic infrastructure
      for high-frequency and algorithmic trading across equities, forex, options,
      and futures.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.home.saxo/platforms/api
    baseURL: https://www.home.saxo/platforms/api
    tags:
      - FIX Protocol
      - Institutional
      - Algorithmic Trading
      - High Frequency Trading
      - Multi-Asset Liquidity
    properties:
