name: Saxo Bank
description: >-
  Saxo Bank provides an OpenAPI-based REST platform giving developers access to
  all resources and functionality required to build high-performance multi-asset
  trading applications. The API covers trading equities, forex, options, futures,
  and other instruments; real-time and streaming market data; order management;
  portfolio and account administration; reference data on thousands of tradable
  instruments; and event notification services. It is the same infrastructure
  that powers SaxoTraderGO, SaxoTraderPRO, and a broad ecosystem of third-party
  integrations including TradingView and MultiCharts.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Investment Banking
  - Trading
  - Equities
  - Forex
  - Options
  - Futures
  - Market Data
  - Portfolio Management
  - Orders
  - Financial

url: https://raw.githubusercontent.com/api-evangelist/saxo/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
